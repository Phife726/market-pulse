name: Tests

# The PR gate. The other three workflows are schedule/dispatch-only, so until
# this existed nothing ran on a pull request and the suite was only exercised
# after merge, inside the production and QA pipeline jobs.
#
# Deliberately secretless: every external client (OpenAI, Supabase, Serper,
# Firecrawl, ZoomInfo, Resend) is mocked or uses an in-memory adapter, so the
# suite passes with an empty environment. Keep it that way — a test that needs
# a secret to pass is a test making a live call.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# A new push to a PR supersedes the run in flight; main is never cancelled.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 3.10 matches the production pipeline workflows — the gate must run on
      # the interpreter the daily cron uses, not a newer default.
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install requirements.txt
        run: pip install -r requirements.txt

      - name: Run pytest tests/
        run: pytest tests/
