# ============================================================
# Market-Pulse Control Panel
# ============================================================
# To monitor a new entity: add a line with name and active: true
# To pause an entity:      set active: false
# No Python changes required — just edit this file and commit.
#
# Categories:
#   competitors   — direct market competitors
#   customers     — Americhem's key accounts
#   suppliers     — raw material and chemical suppliers
#   raw_materials — commodity/specialty material keyword searches
#   markets       — broad industry/segment keyword searches
#
# discovery settings control how Serper.dev queries are constructed:
#   results_per_entity  — articles fetched per entity per run
#   lookback_hours      — how far back to search
#   min_article_length  — minimum chars to pass to LLM (filters stubs)
# ============================================================

