    - "video games"

# NOTE: Moody's spec uses "acetyl" — corrected to "acetal" (polyacetal/POM polymer).
# PPE kept per spec; include_all: polymer suppresses personal-protective-equipment noise.
# engineered_resins  = raw material supply/pricing context (include_all: polymer)
# performance_compounds = processing/formulation context (include_all: compounding)
engineered_resins:
  search_mode: concept
  active: true
  include_any:
    - acetal
    - nylon
    - PBT
    - polycarbonate
    - PEEK
    - PEI
    - PES
    - PET
    - polyolefin
    - PPE
    - PPS
    - PSU
    - TPE
    - TPU
    - thermoplastics
  include_all:
    - polymer
  exclude_any:
    - patents

performance_compounds:
  search_mode: concept
  active: true
  include_any:
    - acetal
    - nylon
    - PBT
    - polycarbonate
    - PEEK
    - PEI
    - PES
    - PET
    - polyolefin
    - PPE
    - PPS
    - PSU
    - TPE
    - TPU
    - thermoplastics
  include_all:
    - compounding
  exclude_any:
    - patents
