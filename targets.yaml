# ── MACROECONOMIC OUTLOOK GROUPS ──────────────────────────────
# Dedicated macro-signal discovery feeding the Macroeconomic Outlook section
# (see the macro-outlook design). These MUST remain the LAST groups in the
# file: load_targets() processes groups in file order, so a deadline-limited
# ingestion run sacrifices macro coverage before entity coverage — graceful
# degradation by construction. Do not interleave entity/concept groups below.
# The old generic `economic` group is intentionally absorbed here; do not
# reintroduce it (it would duplicate discovery and dilute the source pack).
